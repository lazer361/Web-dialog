server {
    listen 80;
    server_name 127.0.0.1 localhost;
    root /var/www/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /frontend/ {
        alias /var/www/frontend/;
        try_files $uri $uri/ /index.html;
    }

    location = /api/messenger.wsdl {
        alias /var/www/backend/public/messenger.wsdl;
        default_type text/xml;
    }

    location ~ ^/api/(.+\.php)$ {
        alias /var/www/backend/public/$1;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/$1;
        fastcgi_pass php:9000;
    }


    location /ws {
        proxy_pass http://websocket:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"webdialog-nginx"}';
    }
}
